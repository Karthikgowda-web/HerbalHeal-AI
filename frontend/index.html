<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>HerbalHeal Identification</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(
            (registration) => {
              console.log('🌿 HerbalHeal PWA Active | Scope:', registration.scope);
            },
            (error) => {
              console.log('⚠️ HerbalHeal PWA failed to initialize:', error);
            }
          );
        });
      }
    </script>
  </body>
</html>
